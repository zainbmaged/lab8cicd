name: Build and Deploy

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5  

      - name: Log in to Docker Hub
        uses: docker/login-action@v4  
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 

      - name: Build and push Docker image
        uses: docker/build-push-action@v7  # Latest release supporting Node.js24 :contentReference[oaicite:4]{index=4}
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lab8-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_KEY }}
          script: |
            cd ~/lab8-cicd
            git pull
            docker volume rm $(docker volume ls -q) || true

            # Clean up
            docker stop $(docker ps -q) || true
            docker rm $(docker ps -aq) || true

            # Create network
            docker network create lab8-net || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/lab8-app:latest

            # Run Postgres
            docker run -d \
            --name lab8-postgres \
            --network lab8-net \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=secret \
            -e POSTGRES_DB=lab8 \
            -v ~/lab8-cicd/init.sql:/docker-entrypoint-initdb.d/init.sql \
            postgres:15

            sleep 5

            docker run -d \
            --name lab8-app \
            --network lab8-net \
            -p 3000:3000 \
            -e DB_HOST=lab8-postgres \
            -e DB_USER=postgres \
            -e DB_PASS=secret \
            -e DB_NAME=lab8 \
            -e DB_PORT=5432 \
            ${{ secrets.DOCKERHUB_USERNAME }}/lab8-app:latest \
            sh -c "until pg_isready -h lab8-postgres -p 5432 -U postgres; do echo 'waiting for db'; sleep 2; done; node app.js"
                        